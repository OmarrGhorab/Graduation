# Docker Compose for Graduation Project
# Full backend stack, including API Gateway, Auth, and Notification services

services:
  # ============ DATABASES ============
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: graduation
      POSTGRES_PASSWORD: graduation_secret
      POSTGRES_DB: graduation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graduation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============ KAFKA ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ============ CORE NODE SERVICES ============
  auth-service:
    build: ./auth-service
    ports:
      - "6001:6001"
    environment:
      - PORT=6001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation?schema=auth
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=47079cb745e7b5c1ebaa8106cabc00f43d6356ce3b0d4b725156742f4084280b
      - JWT_REFRESH_SECRET=9c827cce69b4710f2bbacaeb9bfb3cf39ced15e52b6791ca1d6ac2f270e645ce
      - ARCJET_ENV=production
      - ARCJET_KEY=${ARCJET_KEY:-}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - SENTRY_DSN=https://af6a4e0ac2bfdd50552fe552a0f31364@o4511274234216448.ingest.de.sentry.io/4511274248765520
      - GOOGLE_CLIENT_ID=564438837664-tcv289cukv6pvmmhgr4n7kki8mj8t3pf.apps.googleusercontent.com
      - TWO_FACTOR_ENCRYPTION_KEY=fb237104351755c61c81a8bed9e5f2fc9621ecb6a078f2c745881042bb693881
      - SERVICE_NAME=VeriQ Academy
      - EMAIL_FROM=${EMAIL_FROM:-onboarding@resend.dev}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NOTIFICATION_SERVICE_URL=http://notification-service:6003
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080,http://localhost:3001
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./notification-service
    ports:
      - "6003:6003"
    env_file:
      - ./notification-service/.env
    environment:
      - PORT=6003
      - NODE_ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation?schema=notifications
      - COURSES_SERVICE_URL=http://courses-service-1:8085
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:6001
      - KAFKA_BROKERS=kafka:29092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=notification-service
      - SENTRY_DSN=https://af6a4e0ac2bfdd50552fe552a0f31364@o4511274234216448.ingest.de.sentry.io/4511274248765520
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ALLOWED_ORIGINS=*
      - AUTH_SERVICE_URLS=http://auth-service:6001
      - NOTIFICATION_SERVICE_URLS=http://notification-service:6003
      - CHAT_SERVICE_URLS=http://chat-service-1:6004,http://chat-service-2:6014,http://chat-service-3:6024
      - WS_GATEWAY_URLS=http://ws-gateway-1:6005,http://ws-gateway-2:6015,http://ws-gateway-3:6025
      - COURSES_SERVICE_URLS=http://courses-service-1:8085,http://courses-service-2:8085
      - PAYMENT_SERVICE_URLS=http://payment-service:8090
      - RECOMMENDATION_SERVICE_URLS=http://recommendation-service:8095
      - ARCJET_KEY=${ARCJET_KEY:-}
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=api-gateway
      - SENTRY_DSN=https://af6a4e0ac2bfdd50552fe552a0f31364@o4511274234216448.ingest.de.sentry.io/4511274248765520
    depends_on:
      auth-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      chat-service-1:
        condition: service_started
      chat-service-2:
        condition: service_started
      chat-service-3:
        condition: service_started
      ws-gateway-1:
        condition: service_started
      ws-gateway-2:
        condition: service_started
      ws-gateway-3:
        condition: service_started
      courses-service-1:
        condition: service_healthy
      courses-service-2:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      recommendation-service:
        condition: service_started
    healthcheck:
