# Docker Compose for Graduation Project - Supporting Infrastructure Only
# Node services (API Gateway, Auth, Notification) are managed via terminal

services:
  # ============ DATABASES ============
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: graduation
      POSTGRES_PASSWORD: graduation_secret
      POSTGRES_DB: graduation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graduation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============ KAFKA ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ============ CHAT SERVICE (3 instances) ============
  chat-service-1:
    build: ./chat-service
    ports:
      - "6004:6004"
    environment:
      - PORT=6004
      - ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - JWT_ACCESS_SECRET=47079cb745e7b5c1ebaa8106cabc00f43d6356ce3b0d4b725156742f4084280b
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - NOTIFICATION_SERVICE_URL=http://host.docker.internal:6003
      - AUTH_SERVICE_URL=http://host.docker.internal:6001
      - WS_GATEWAY_URL=http://ws-gateway-1:6005
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ws-gateway-1:
        condition: service_started

  chat-service-2:
    build: ./chat-service
    ports:
      - "6014:6014"
    environment:
      - PORT=6014
      - ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - JWT_ACCESS_SECRET=47079cb745e7b5c1ebaa8106cabc00f43d6356ce3b0d4b725156742f4084280b
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - NOTIFICATION_SERVICE_URL=http://host.docker.internal:6003
      - AUTH_SERVICE_URL=http://host.docker.internal:6001
      - WS_GATEWAY_URL=http://ws-gateway-2:6015
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ws-gateway-2:
        condition: service_started

  chat-service-3:
    build: ./chat-service
    ports:
      - "6024:6024"
    environment:
      - PORT=6024
      - ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - JWT_ACCESS_SECRET=47079cb745e7b5c1ebaa8106cabc00f43d6356ce3b0d4b725156742f4084280b
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - NOTIFICATION_SERVICE_URL=http://host.docker.internal:6003
      - AUTH_SERVICE_URL=http://host.docker.internal:6001
      - WS_GATEWAY_URL=http://ws-gateway-3:6025
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ws-gateway-3:
        condition: service_started

  # ============ WS GATEWAY (3 instances) ============
  ws-gateway-1:
    build: ./ws-gateway
    ports:
      - "6005:6005"
    environment:
      - PORT=6005
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - JWT_SECRET=47079cb745e7b5c1ebaa8106cabc00f43d6356ce3b0d4b725156742f4084280b
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  ws-gateway-2:
    build: ./ws-gateway
    ports:
      - "6015:6015"
    environment:
      - PORT=6015
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - JWT_SECRET=47079cb745e7b5c1ebaa8106cabc00f43d6356ce3b0d4b725156742f4084280b
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  ws-gateway-3:
    build: ./ws-gateway
    ports:
      - "6025:6025"
    environment:
      - PORT=6025
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
      - JWT_SECRET=47079cb745e7b5c1ebaa8106cabc00f43d6356ce3b0d4b725156742f4084280b
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  # ============ COURSES & ATTENDANCE SERVICE (2 instances) ============
  courses-service-1:
    build: ./courses-attendance-service
    ports:
      - "8085:8085"
    environment:
      - SERVER_PORT=8085
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=graduation
      - DB_PASSWORD=graduation_secret
      - DB_NAME=graduation
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - AUTH_SERVICE_URL=http://host.docker.internal:6001
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - QR_SIGNING_SECRET=qr-mega-secret-2026
      - QR_ROTATION_INTERVAL_SECONDS=30
      - QR_EXPIRY_SECONDS=35
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_FOLDER=course-materials
      - AI_SERVICE_URL=http://recommendation-service:8095
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  courses-service-2:
    build: ./courses-attendance-service
    ports:
      - "8086:8085"
    environment:
      - SERVER_PORT=8085
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=graduation
      - DB_PASSWORD=graduation_secret
      - DB_NAME=graduation
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - AUTH_SERVICE_URL=http://host.docker.internal:6001
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - QR_SIGNING_SECRET=qr-mega-secret-2026
      - QR_ROTATION_INTERVAL_SECONDS=30
      - QR_EXPIRY_SECONDS=35
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_FOLDER=course-materials
      - AI_SERVICE_URL=http://recommendation-service:8095
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============ PAYMENT SERVICE ============
  payment-service:
    build: ./payment-service
    ports:
      - "8090:8090"
    environment:
      - SERVER_PORT=8090
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=graduation
      - DB_PASSWORD=graduation_secret
      - DB_NAME=graduation
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - AUTH_SERVICE_URL=http://host.docker.internal:6001
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - PAYMOB_API_KEY=${PAYMOB_API_KEY}
      - PAYMOB_CARD_INTEGRATION_ID=${PAYMOB_CARD_INTEGRATION_ID}
      - PAYMOB_WALLET_INTEGRATION_ID=${PAYMOB_WALLET_INTEGRATION_ID}
      - PAYMOB_IFRAME_ID=${PAYMOB_IFRAME_ID}
      - PAYMOB_HMAC_SECRET=${PAYMOB_HMAC_SECRET}
      - COURSES_SERVICE_URL=http://courses-service-1:8085
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-onboarding@resend.dev}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Payment Service}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      courses-service-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============ RECOMMENDATION SERVICE ============
  recommendation-service:
    build: ./recommendation-service
    ports:
      - "8095:8095"
    environment:
      - SERVER_PORT=8095
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation
      - REDIS_URL=redis://redis:6379
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL}
      - COURSES_SERVICE_URL=http://courses-service-1:8085
      - AUTH_SERVICE_URL=http://host.docker.internal:6001
      - INTERNAL_SERVICE_SECRET=graduation-mega-secret-2026
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_FOLDER=chatbot-media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      courses-service-1:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
