# Docker Compose for Graduation Project - All Microservices
# Supports multiple instances per service for load balancing

version: "3.8"

services:
  # ============ DATABASES ============
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: graduation
      POSTGRES_PASSWORD: graduation_secret
      POSTGRES_DB: graduation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graduation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============ API GATEWAY ============
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ALLOWED_ORIGINS=*
      - AUTH_SERVICE_URLS=http://auth-service-1:6001,http://auth-service-2:6011,http://auth-service-3:6021
      - NOTIFICATION_SERVICE_URLS=http://notification-service-1:6003,http://notification-service-2:6013,http://notification-service-3:6023
      - CHAT_SERVICE_URLS=http://chat-service-1:6004,http://chat-service-2:6014,http://chat-service-3:6024
    depends_on:
      - auth-service-1
      - notification-service-1
      - chat-service-1

  # ============ AUTH SERVICE (3 instances) ============
  auth-service-1:
    build: ./auth-service
    ports:
      - "6001:6001"
    environment:
      - PORT=6001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service-2:
    build: ./auth-service
    ports:
      - "6011:6011"
    environment:
      - PORT=6011
      - NODE_ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service-3:
    build: ./auth-service
    ports:
      - "6021:6021"
    environment:
      - PORT=6021
      - NODE_ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============ NOTIFICATION SERVICE (3 instances) ============
  notification-service-1:
    build: ./notification-service
    ports:
      - "6003:6003"
    environment:
      - PORT=6003
      - NODE_ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service-2:
    build: ./notification-service
    ports:
      - "6013:6013"
    environment:
      - PORT=6013
      - NODE_ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service-3:
    build: ./notification-service
    ports:
      - "6023:6023"
    environment:
      - PORT=6023
      - NODE_ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============ CHAT SERVICE (3 instances) ============
  chat-service-1:
    build: ./chat-service
    ports:
      - "6004:6004"
    environment:
      - PORT=6004
      - ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation?sslmode=disable
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat-service-2:
    build: ./chat-service
    ports:
      - "6014:6014"
    environment:
      - PORT=6014
      - ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation?sslmode=disable
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat-service-3:
    build: ./chat-service
    ports:
      - "6024:6024"
    environment:
      - PORT=6024
      - ENV=production
      - DATABASE_URL=postgresql://graduation:graduation_secret@postgres:5432/graduation?sslmode=disable
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
